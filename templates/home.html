{% extends 'base.html' %}
{% block content %}
<h2>Canciones</h2>
<div class="row">
    {% for song in songs %}
    <div class="col-md-4 mb-3">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ song.title }}</h5>
                <p class="card-text">{{ song.album.artist.name }} - {{ song.album.title }}</p>
                <button class="btn btn-primary play-song" data-url="{{ song.audio_file.url }}">Reproducir</button>
            </div>
        </div>
    </div>
    {% empty %}
    <p>No hay canciones disponibles.</p>
    {% endfor %}
</div>
{% endblock %}

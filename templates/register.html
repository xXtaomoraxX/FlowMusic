{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FlowMusic</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link href="{% static 'css/styles.css' %}" rel="stylesheet" />

        <style>
            input {
                background-color: #1e293b;
                color: #f8fafc;
                border: 1px solid #334155;
                display: block;
                width: 100%;

                outline: none;
                transition: border-color 0.3s ease;

                border-radius: 4px;
                padding-inline: 12px;
                padding-block: 12px;

                max-block-size: 44px;

                font-size: 11pt;
                font-weight: 500;
            }

            input:focus {
                border-color: var(--accent);
            }

            label {
                font-size: 11pt;
                font-weight: 500;
            }

            .container {
                max-width: 350px;
                margin-inline: auto;

                display: flex;
                flex-direction: column;
                gap: 12px;

                align-items: center;
            }

            form {
                width: 100%;
                margin-top: 24px;
            }

            .subject {
                text-align: center;

                h1 {
                    font-weight: 800;
                }

                h2 {
                    font-size: 18pt;
                    margin-top: 80px;
                    margin-bottom: 12px;
                }
            }

            button {
                background-color: #ffadff;
                color: black;
                border: none;
                padding: 12px 24px;
                border-radius: 24px;
                cursor: pointer;
                width: 100%;

                font-weight: 700;
                transition: opacity 0.3s ease;
            }

            button:hover {
                opacity: 0.8;
            }

            .error,
            .password_mismatch,
            .password_invalid {
                color: #f3727f;

                font-size: 11pt;
                font-weight: 500;
            }
        </style>

        <script>
            function validatePassword() {
                var password = document.getElementById("password").value;
                var confirmPassword =
                    document.getElementById("confirm_password").value;

                const element = document.querySelector(".password_mismatch");
                if (password !== confirmPassword) {
                    element.innerText = "Passwords do not match";

                    return;
                }

                element.innerText = "";
            }

            function checkPasswordStrength() {
                var password = document.getElementById("password").value;
                const element = document.querySelector(".password_invalid");
                if (password.length < 8) {
                    element.innerText =
                        "Password must be at least 8 characters";

                    return;
                }

                element.innerText = "";
            }
        </script>
    </head>
    <body>
        <div class="container">
            <div class="subject">
                <h2>FlowMusic</h2>
                <h1>Registrate para empezar a escuchar</h1>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" required />
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="name@domain.com"
                        required
                    />
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input
                        onchange="validatePassword() || checkPasswordStrength()"
                        onkeydown="
                            validatePassword() || checkPasswordStrength()
                        "
                        onkeyup="validatePassword() || checkPasswordStrength()"
                        type="password"
                        id="password"
                        name="password"
                        required
                    />

                    <p class="password_invalid"></p>
                </div>

                <div class="mb-3">
                    <label for="confirm_password" class="form-label"
                        >Confirm Password</label
                    >
                    <input
                        onchange="validatePassword()"
                        onkeydown="validatePassword()"
                        onkeyup="validatePassword()"
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        required
                    />

                    <p class="password_mismatch"></p>
                </div>

                {% if error %}
                <div class="mb-3">
                    <p class="error">{{ error }}</p>
                </div>
                {% endif %}

                <button type="submit">Register</button>
            </form>
        </div>
    </body>
</html>

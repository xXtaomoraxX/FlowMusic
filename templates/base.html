{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowMusic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>

    <style>
        .gap-10 {
            gap: 10rem;
        }

        .form-control {
            width: 35vw;
            opacity: 0.9;

            background-color: #1a1a2e;
            border: 1px solid #2e2e50;
        }

        .form-control:focus {
             color: var(--text-light);
        }

        .form-control::placeholder {
            color: #b3b3b3;
        }

        .dropdown-menu {
            background-color: #1a1a2e ;
            min-width: 20rem;

            padding: 0;
        }

        .dropdown-item {
            color: #ffffffe6;
            font-size: 10pt;
            font-weight: 600;
            min-height: 2.5rem;

            flex: 1;
            display: flex;
            align-items: center;
        }

        .dropdown-item:hover {
            background-color: #ffffff1a;
            color: #ffffffe6;
        }

    </style>
</head>
<body>
    <header class="py-2 px-4 d-flex justify-content-between align-items-center">

        <h2 class="m-0" style="color: var(--accent);">FlowMusic</h2>
        <form action="{% url 'search' %}" method="get" class="d-flex">
            <input class="form-control rounded-5 px-4 py-2 me-2"
                type="search"
                name="q"
                placeholder="¿Qué deseas escuchar?"
                value="{{ query }}"
            >
        </form>

        <div class="dropdown">
            <button style="height: 48px; width: 48px; border: none; background-color: #1a1a2e;"
                class="d-flex align-items-center justify-content-center rounded-circle btn dropdown-toggle"
                data-bs-toggle="dropdown">
                <figure class="m-0">
                    <div>
                        <img src="{% static 'images/default.png' %}" alt="" style="height: 32px; width: 32px; border-radius: 50%;">
                    </div>
                </figure>
            </button>

            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="{% url 'logout' %}">Cerrar sesión</a></li>
            </ul>
        </div>
    </header>
    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>
    <footer class="bg-dark text-white p-3 fixed-bottom">
        <div class="container">
            <audio id="audio-player" controls class="w-100"></audio>
        </div>
    </footer>

    <script>
        const audioPlayer = document.getElementById('audio-player');
        function playSong(url) {
            audioPlayer.src = url;
            audioPlayer.play();
        }
        document.addEventListener('DOMContentLoaded', function() {
            const playButtons = document.querySelectorAll('.play-song');
            playButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const url = this.getAttribute('data-url');
                    playSong(url);
                });
            });
        });
    </script>
</body>
</html>
